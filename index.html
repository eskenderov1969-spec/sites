<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Startup AI Platform</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
body { margin:0; background:#000; color:white; font-family:system-ui; overflow-x:hidden; }

.glow {
  position:absolute;
  width:700px;
  height:700px;
  filter:blur(140px);
  opacity:0.35;
  border-radius:50%;
  animation: float 10s infinite ease-in-out;
}

@keyframes float {
  0%{transform:translate(0,0)}
  50%{transform:translate(80px,-60px)}
  100%{transform:translate(0,0)}
}

.card {
  background: rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  border-radius:20px;
  padding:20px;
}
</style>
</head>

<body>

<!-- BACKGROUND -->
<div class="glow" style="background:cyan; top:0; left:0;"></div>
<div class="glow" style="background:purple; bottom:0; right:0;"></div>

<!-- HEADER -->
<div class="p-8 flex justify-between items-center relative z-10">
<h1 class="text-cyan-300 text-2xl font-bold">🚀 AI Startup</h1>

<div class="flex gap-4">
<a href="https://t.me/Essskenderovvv" class="text-cyan-300">Telegram</a>
<a href="https://wa.me/79282185570" class="text-green-400">WhatsApp</a>
</div>
</div>

<!-- HERO -->
<div class="p-10 relative z-10">
<h2 class="text-5xl font-bold">
AI Platform <span class="text-cyan-300">Next Generation</span>
</h2>

<p class="text-gray-400 mt-4 max-w-xl">
Полноценный стартап-интерфейс с AI, 3D и автоматизацией.
</p>
</div>

<!-- GRID -->
<div class="grid md:grid-cols-3 gap-4 p-10 relative z-10">

<div class="card">
<h3 class="text-cyan-300">🤖 AI Chat</h3>
<p>Готово к подключению OpenAI API</p>
</div>

<div class="card">
<h3 class="text-cyan-300">📡 CRM</h3>
<p>Формы заявок + Telegram bot</p>
</div>

<div class="card">
<h3 class="text-cyan-300">🧠 Auth</h3>
<p>Локальная авторизация + сервер</p>
</div>

</div>

<!-- FORM -->
<div class="p-10 relative z-10">
<div class="card max-w-xl">

<h3 class="text-cyan-300 mb-3">📩 Заявка</h3>

<input id="name" placeholder="Имя" class="w-full p-2 mb-2 text-black"/>
<textarea id="msg" placeholder="Сообщение" class="w-full p-2 text-black"></textarea>

<button onclick="send()" class="mt-3 bg-cyan-400 text-black px-4 py-2 rounded-xl">
Отправить
</button>

</div>
</div>

<!-- 3D BACKGROUND -->
<canvas id="bg"></canvas>

<script>
// FORM DEMO
function send(){
  alert("Заявка отправлена (демо)");
}

// THREE JS
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer({canvas: document.getElementById("bg"), alpha:true});
renderer.setSize(innerWidth, innerHeight);
renderer.domElement.style.position="fixed";
renderer.domElement.style.top="0";
renderer.domElement.style.zIndex="-1";

const geo = new THREE.IcosahedronGeometry(10, 1);
const mat = new THREE.MeshBasicMaterial({color:0x00ffff, wireframe:true});
const mesh = new THREE.Mesh(geo, mat);

scene.add(mesh);
camera.position.z = 30;

function animate(){
  requestAnimationFrame(animate);
  mesh.rotation.x += 0.01;
  mesh.rotation.y += 0.01;
  renderer.render(scene,camera);
}
animate();
</script>

</body>
</html>
