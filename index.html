<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Eskenderov space</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  margin:0;
  font-family: system-ui;
  background: linear-gradient(135deg, #f8fafc, #eef2ff);
  color:#111;
}

.blob {
  position:absolute;
  width:400px;
  height:400px;
  border-radius:50%;
  filter: blur(100px);
  opacity:0.35;
}

.card {
  background:white;
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  transition:0.3s;
}

.card:hover {
  transform:translateY(-5px);
}

.btn {
  transition:0.3s;
}
.btn:hover {
  transform:scale(1.05);
}

.fade-up {
  opacity:0;
  transform: translateY(40px);
  transition: all 0.8s ease;
}

.fade-up.show {
  opacity:1;
  transform: translateY(0);
}

/* LOGIN */
#loginPage {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.hidden {
  display:none;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="card w-[320px]">
    <h2 class="text-xl font-bold text-blue-600 mb-3">Вход в личный кабинет</h2>

    <input id="login" placeholder="Логин"
      class="w-full border p-2 rounded mb-2"/>

    <input id="password" type="password" placeholder="Пароль"
      class="w-full border p-2 rounded mb-3"/>

    <button onclick="loginUser()"
      class="btn w-full bg-blue-600 text-white py-2 rounded-xl">
      Войти
    </button>

    <p id="error" class="text-red-500 text-sm mt-2"></p>
  </div>
</div>

<!-- фон -->
<div class="blob" style="background:#60a5fa; top:-100px; left:-100px;"></div>
<div class="blob" style="background:#a78bfa; bottom:-100px; right:-100px;"></div>

<!-- HEADER -->
<header class="p-6 flex justify-between items-center relative z-10 fade-up">
  <h1 class="text-2xl font-bold text-blue-600">Официальный сайт</h1>

  <button onclick="logout()" class="text-sm text-red-500">
    Выйти
  </button>
</header>

<!-- HERO -->
<section class="p-10 relative z-10 fade-up">
  <h2 class="text-5xl font-bold text-gray-800">Eskenderov space</h2>
</section>

<!-- FILE UPLOAD CABINET -->
<section class="p-10 relative z-10 fade-up">
  <div class="card max-w-2xl">

    <h3 class="text-xl font-bold text-blue-600 mb-3">
      Личный кабинет — загрузка файлов
    </h3>

    <input type="file" id="fileInput" multiple class="mb-3"/>

    <button onclick="uploadFiles()"
      class="btn bg-blue-600 text-white px-4 py-2 rounded-xl">
      Загрузить
    </button>

    <div id="gallery" class="grid grid-cols-2 gap-3 mt-5"></div>

  </div>
</section>

<!-- ORIGINAL CONTENT -->
<section id="author" class="p-10 relative z-10 fade-up">
  <div class="card max-w-xl">
    <h3 class="text-xl font-bold text-blue-600">Об авторе</h3>
    <p class="mt-2 text-gray-700">Эскендеров Эмируллах Габибулахович</p>
    <p class="text-gray-500">Студент: ДГУНХ</p>
    <p class="text-gray-500">Город: Махачкала</p>
  </div>
</section>

<section id="contact" class="p-10 relative z-10 fade-up">
  <div class="card max-w-xl">
    <h3 class="text-xl font-bold text-blue-600">Связаться</h3>

    <p class="mt-3 font-semibold">📞 89282185570</p>

    <div class="mt-4 flex gap-3 flex-wrap">
      <a class="btn bg-blue-500 text-white px-4 py-2 rounded-xl"
         href="https://t.me/Essskenderovvv">Telegram</a>

      <a class="btn bg-green-500 text-white px-4 py-2 rounded-xl"
         href="https://wa.me/79282185570">WhatsApp</a>
    </div>
  </div>
</section>

<footer class="p-10 text-center text-gray-600 fade-up">
  © 2026 — Официальный сайт автора
</footer>

<script>
const USER = "Eskenderov";
const PASS = "Ee221352";

function loginUser() {
  const login = document.getElementById("login").value;
  const password = document.getElementById("password").value;

  if (login === USER && password === PASS) {
    document.getElementById("loginPage").classList.add("hidden");
  } else {
    document.getElementById("error").innerText = "Неверный логин или пароль";
  }
}

function logout() {
  document.getElementById("loginPage").classList.remove("hidden");
}

function uploadFiles() {
  const input = document.getElementById("fileInput");
  const gallery = document.getElementById("gallery");

  for (let file of input.files) {
    const reader = new FileReader();

    reader.onload = function(e) {
      const div = document.createElement("div");
      div.className = "card";

      if (file.type.startsWith("image/")) {
        div.innerHTML = `<img src="${e.target.result}" class="rounded-xl w-full"/>`;
      } else {
        div.innerHTML = `<p class="text-sm">${file.name}</p>`;
      }

      gallery.appendChild(div);
    };

    reader.readAsDataURL(file);
  }
}

/* scroll animation */
const elements = document.querySelectorAll('.fade-up');
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) entry.target.classList.add('show');
  });
}, { threshold: 0.2 });

elements.forEach(el => observer.observe(el));
</script>

</body>
</html>
