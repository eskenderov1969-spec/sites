<!-- CSS -->
<!-- добавить в style -->
<!-- ========================= -->

<style>

.filter-btn {

padding: 12px 22px;

border-radius: 999px;

background: rgba(255,255,255,0.08);

border: 1px solid rgba(255,255,255,0.08);

transition: 0.3s;

}

.filter-btn:hover,
.filter-btn.active {

background: #2563eb;

transform: translateY(-2px);

}

.slider-wrapper {

position: relative;

display: flex;

align-items: center;

gap: 20px;

}

.portfolio-slider {

display: flex;

gap: 30px;

overflow-x: auto;

scroll-behavior: smooth;

padding: 10px;

}

.portfolio-slider::-webkit-scrollbar {
display: none;
}

.slider-btn {

width: 60px;
height: 60px;

border-radius: 999px;

border: none;

background: rgba(255,255,255,0.08);

font-size: 24px;

cursor: pointer;

transition: 0.3s;

}

.slider-btn:hover {

transform: scale(1.08);

background: #2563eb;

}

.project-card {

min-width: 360px;

position: relative;

}

.preview-overlay {

position: absolute;
inset: 0;

background: rgba(0,0,0,0.7);

display: flex;
align-items: center;
justify-content: center;

font-size: 28px;
font-weight: bold;

opacity: 0;

transition: 0.4s;

border-radius: 32px;

z-index: 5;

backdrop-filter: blur(8px);

}

.project-card:hover .preview-overlay {

opacity: 1;

}

.modal {

position: fixed;
inset: 0;

background: rgba(0,0,0,0.8);

display: none;

align-items: center;
justify-content: center;

padding: 20px;

z-index: 9999;

backdrop-filter: blur(10px);

}

.modal.active {
display: flex;
}

.modal-content {

max-width: 800px;
width: 100%;

background: #0f172a;

border-radius: 32px;

padding: 30px;

position: relative;

animation: modalShow 0.4s ease;

}

@keyframes modalShow {

from {
opacity: 0;
transform: scale(0.9);
}

to {
opacity: 1;
transform: scale(1);
}

}

.modal-img {

width: 100%;

height: 350px;

object-fit: cover;

border-radius: 24px;

}

.close-modal {

position: absolute;

top: 20px;
right: 20px;

width: 45px;
height: 45px;

border: none;

border-radius: 999px;

background: rgba(255,255,255,0.1);

cursor: pointer;

font-size: 18px;

color: white;

}

</style>

<!-- ========================= -->
<!-- JAVASCRIPT -->
<!-- добавить в script -->
<!-- ========================= -->

<script>

/* language */

const translations = {

ru: {

portfolio: 'Портфолио',

demo: 'Live Demo',

details: 'Подробнее'

},

en: {

portfolio: 'Portfolio',

demo: 'Live Demo',

details: 'Details'

}

};

let currentLang = 'ru';

const langToggle =
document.getElementById('langToggle');

langToggle.addEventListener('click', () => {

currentLang =
currentLang === 'ru'
? 'en'
: 'ru';

langToggle.textContent =
currentLang === 'ru'
? 'EN'
: 'RU';

document.getElementById(
'portfolioTitle'
).textContent =
translations[currentLang].portfolio;

});

/* slider */

const slider =
document.getElementById(
'portfolioSlider'
);

document.getElementById(
'nextSlide'
).onclick = () => {

slider.scrollBy({
left: 400,
behavior: 'smooth'
});

};

document.getElementById(
'prevSlide'
).onclick = () => {

slider.scrollBy({
left: -400,
behavior: 'smooth'
});

};

/* filter */

const filterBtns =
document.querySelectorAll('.filter-btn');

const cards =
document.querySelectorAll('.project-card');

filterBtns.forEach(btn => {

btn.addEventListener('click', () => {

filterBtns.forEach(b =>
b.classList.remove('active')
);

btn.classList.add('active');

const filter =
btn.dataset.filter;

cards.forEach(card => {

if (
filter === 'all' ||
card.dataset.category === filter
) {

card.style.display = 'block';

} else {

card.style.display = 'none';

}

});

});

});

/* modal */

const modal =
document.getElementById(
'projectModal'
);

const modalTitle =
document.getElementById(
'modalTitle'
);

const modalDesc =
document.getElementById(
'modalDesc'
);

const modalImg =
document.getElementById(
'modalImg'
);

document.querySelectorAll(
'.open-modal'
).forEach(btn => {

btn.addEventListener('click', () => {

modal.classList.add('active');

modalTitle.textContent =
btn.dataset.title;

modalDesc.textContent =
btn.dataset.desc;

modalImg.src =
btn.dataset.img;

});

});

document.getElementById(
'closeModal'
).onclick = () => {

modal.classList.remove('active');

};

modal.addEventListener('click', (e) => {

if (e.target === modal) {

modal.classList.remove('active');

}

});

</script>
