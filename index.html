<style>
body {
  margin:0;

  background: linear-gradient(135deg, #f8fafc, #eef2ff);
  color:#111;
}

.blob {
  position:absolute;
  width:400px;
  height:400px;
  border-radius:50%;
  filter: blur(100px);
  opacity:0.35;
}

.card {
  background:white;
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  transition:0.3s;
}

.card:hover {
  transform:translateY(-5px);
}

.btn {
  transition:0.3s;
}
.btn:hover {
  transform:scale(1.05);
}
</style>
</head>
