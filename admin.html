<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Eskenderov Admin</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

html{
scroll-behavior:smooth;
}

body{
margin:0;
font-family:Inter,system-ui,sans-serif;
background:#050816;
color:white;
overflow-x:hidden;
}

/* GRID */

.bg-grid{
position:fixed;
inset:0;

background-image:
linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);

background-size:50px 50px;
z-index:-5;
}

/* BLOBS */

.blob{
position:fixed;
width:420px;
height:420px;
border-radius:9999px;
filter:blur(120px);
opacity:.25;
z-index:-4;
animation:float 14s ease-in-out infinite;
}

@keyframes float{

0%{
transform:translate(0,0);
}

50%{
transform:translate(40px,-30px);
}

100%{
transform:translate(0,0);
}

}

/* CONTAINER */

.container{
max-width:1400px;
margin:auto;
padding:40px 20px;
}

/* CARD */

.card{
background:rgba(255,255,255,.05);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.08);

border-radius:32px;

padding:32px;

box-shadow:
0 20px 60px rgba(0,0,0,.35);
}

/* TEXT */

.gradient-text{
background:linear-gradient(
90deg,
#3b82f6,
#8b5cf6,
#ec4899
);

background-size:300% 300%;

animation:gradientMove 8s ease infinite;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

@keyframes gradientMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

/* INPUT */

.input{
width:100%;

margin-top:14px;

padding:16px;

border:none;

border-radius:18px;

outline:none;

background:rgba(255,255,255,.08);

color:white;
}

textarea.input{
min-height:150px;
resize:none;
}

/* BUTTON */

.btn{
padding:16px 24px;

border:none;

border-radius:18px;

font-weight:700;

cursor:pointer;

transition:.3s;

background:#2563eb;

color:white;
}

.btn:hover{
transform:translateY(-3px);
background:#3b82f6;
}

.btn-red{
background:#dc2626;
}

.btn-purple{
background:#7c3aed;
}

/* STATUS */

.status{
margin-top:20px;
padding:14px;
border-radius:18px;
background:rgba(34,197,94,.12);
border:1px solid rgba(34,197,94,.25);
color:#86efac;
text-align:center;
display:none;
}

/* ERROR */

.error{
margin-top:15px;
color:#f87171;
text-align:center;
display:none;
}

/* DASHBOARD */

.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:30px;
}

.stat-card{
background:rgba(255,255,255,.05);
padding:30px;
border-radius:28px;
border:1px solid rgba(255,255,255,.08);
}

.stat-number{
font-size:42px;
font-weight:900;
margin-top:10px;
}

/* PROJECT */

.project-card{
padding:20px;
border-radius:24px;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.08);
margin-top:15px;
}

/* HIDDEN */

.hidden{
display:none;
}

</style>
</head>

<body>

<div class="bg-grid"></div>

<div
class="blob bg-blue-500"
style="top:-120px;left:-120px"></div>

<div
class="blob bg-purple-500"
style="bottom:-120px;right:-120px"></div>

<div class="container">

<!-- LOGIN -->

<div
id="loginBox"
class="card max-w-xl mx-auto">

<h1 class="text-5xl font-black gradient-text text-center mb-10">

Admin Panel

</h1>

<p class="text-center text-gray-400 mb-6">

Введите пароль администратора

</p>

<input
id="password"
type="password"
placeholder="Пароль"
class="input"
/>

<button
id="loginBtn"
class="btn w-full mt-5">

Войти

</button>

<p id="error" class="error">

Неверный пароль

</p>

</div>

<!-- ADMIN -->

<div id="adminPanel" class="hidden">

<div class="flex justify-between items-center mb-10">

<h1 class="text-5xl font-black gradient-text">

Eskenderov CMS

</h1>

<button
onclick="window.location.href='index.html'"
class="btn btn-purple">

На сайт

</button>

</div>

<!-- DASHBOARD -->

<div class="dashboard">

<div class="stat-card">
<div class="text-gray-400">
Проектов
</div>
<div class="stat-number">
12
</div>
</div>

<div class="stat-card">
<div class="text-gray-400">
Посетителей
</div>
<div class="stat-number">
4.8K
</div>
</div>

<div class="stat-card">
<div class="text-gray-400">
Сообщений
</div>
<div class="stat-number">
86
</div>
</div>

<div class="stat-card">
<div class="text-gray-400">
Статус
</div>
<div class="stat-number text-green-400">
ONLINE
</div>
</div>

</div>

<!-- CMS -->

<div class="grid lg:grid-cols-2 gap-10 mt-10">

<!-- LEFT -->

<div class="card">

<h2 class="text-3xl font-bold mb-8">

Редактирование сайта

</h2>

<input
id="titleInput"
class="input"
placeholder="Название сайта"
/>

<textarea
id="aboutInput"
class="input"
placeholder="Описание сайта"></textarea>

<input
id="phoneInput"
class="input"
placeholder="Телефон"
/>

<input
id="telegramInput"
class="input"
placeholder="Telegram ссылка"
/>

<button
id="saveBtn"
class="btn w-full mt-5">

Сохранить изменения

</button>

<div id="success" class="status">

Изменения сохранены

</div>

</div>

<!-- RIGHT -->

<div class="card">

<h2 class="text-3xl font-bold mb-8">

Управление проектами

</h2>

<div id="projectsList"></div>

<button
id="addProjectBtn"
class="btn w-full mt-5">

Добавить проект

</button>

</div>

</div>

<!-- SETTINGS -->

<div class="grid lg:grid-cols-2 gap-10 mt-10">

<div class="card">

<h2 class="text-3xl font-bold mb-8">

Настройки сайта

</h2>

<div class="space-y-4">

<label class="flex items-center gap-4">
<input type="checkbox" checked>
<span>Particles эффект</span>
</label>

<label class="flex items-center gap-4">
<input type="checkbox" checked>
<span>Glassmorphism UI</span>
</label>

<label class="flex items-center gap-4">
<input type="checkbox" checked>
<span>Premium animations</span>
</label>

<label class="flex items-center gap-4">
<input type="checkbox">
<span>Maintenance mode</span>
</label>

</div>

</div>

<div class="card">

<h2 class="text-3xl font-bold mb-8">

Быстрые действия

</h2>

<div class="flex flex-col gap-4">

<button class="btn">
Очистить localStorage
</button>

<button class="btn btn-red">
Удалить проекты
</button>

<button class="btn btn-purple">
Backup сайта
</button>

</div>

</div>

</div>

</div>

</div>

<script>

/* PASSWORD */

const PASSWORD = "Ee221352";

/* ELEMENTS */

const loginBtn =
document.getElementById('loginBtn');

const password =
document.getElementById('password');

const error =
document.getElementById('error');

const loginBox =
document.getElementById('loginBox');

const adminPanel =
document.getElementById('adminPanel');

const titleInput =
document.getElementById('titleInput');

const aboutInput =
document.getElementById('aboutInput');

const phoneInput =
document.getElementById('phoneInput');

const telegramInput =
document.getElementById('telegramInput');

const saveBtn =
document.getElementById('saveBtn');

const success =
document.getElementById('success');

const projectsList =
document.getElementById('projectsList');

const addProjectBtn =
document.getElementById('addProjectBtn');

/* LOGIN */

loginBtn.addEventListener('click',()=>{

if(password.value.trim() === PASSWORD){

loginBox.classList.add('hidden');

adminPanel.classList.remove('hidden');

/* LOAD */

titleInput.value =
localStorage.getItem('siteTitle')
|| 'Eskenderov Space';

aboutInput.value =
localStorage.getItem('aboutText')
|| '';

phoneInput.value =
localStorage.getItem('phone')
|| '';

telegramInput.value =
localStorage.getItem('telegram')
|| '';

loadProjects();

}else{

error.style.display='block';

}

});

/* SAVE */

saveBtn.addEventListener('click',()=>{

localStorage.setItem(
'siteTitle',
titleInput.value
);

localStorage.setItem(
'aboutText',
aboutInput.value
);

localStorage.setItem(
'phone',
phoneInput.value
);

localStorage.setItem(
'telegram',
telegramInput.value
);

success.style.display='block';

setTimeout(()=>{

success.style.display='none';

},2500);

});

/* PROJECTS */

function loadProjects(){

const projects =
JSON.parse(localStorage.getItem('projects'))
|| [];

projectsList.innerHTML='';

projects.forEach((project,index)=>{

const div=document.createElement('div');

div.className='project-card';

div.innerHTML=`

<h3 class="text-xl font-bold">
${project}
</h3>

<button
onclick="deleteProject(${index})"
class="btn btn-red w-full mt-4">

Удалить

</button>

`;

projectsList.appendChild(div);

});

}

/* ADD PROJECT */

addProjectBtn.addEventListener('click',()=>{

const projectName =
prompt('Название проекта');

if(projectName){

const projects =
JSON.parse(localStorage.getItem('projects'))
|| [];

projects.push(projectName);

localStorage.setItem(
'projects',
JSON.stringify(projects)
);

loadProjects();

}

});

/* DELETE PROJECT */

function deleteProject(index){

const projects =
JSON.parse(localStorage.getItem('projects'))
|| [];

projects.splice(index,1);

localStorage.setItem(
'projects',
JSON.stringify(projects)
);

loadProjects();

}

</script>

</body>
</html>
