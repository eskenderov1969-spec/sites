<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Eskenderov Admin</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
margin:0;
font-family:Inter,system-ui,sans-serif;
background:#050816;
color:white;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
overflow:hidden;
}

/* GRID */

.bg-grid{
position:fixed;
inset:0;

background-image:
linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);

background-size:50px 50px;
z-index:-5;
}

/* BLOBS */

.blob{
position:fixed;
width:400px;
height:400px;
border-radius:9999px;
filter:blur(120px);
opacity:.25;
z-index:-4;
animation:float 14s ease-in-out infinite;
}

@keyframes float{

0%{
transform:translate(0,0);
}

50%{
transform:translate(40px,-30px);
}

100%{
transform:translate(0,0);
}

}

/* CARD */

.card{
width:100%;
max-width:520px;

padding:40px;

background:rgba(255,255,255,.05);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.08);

border-radius:32px;

box-shadow:
0 20px 60px rgba(0,0,0,.35);
}

/* TEXT */

.gradient-text{
background:linear-gradient(
90deg,
#3b82f6,
#8b5cf6,
#ec4899
);

background-size:300% 300%;

animation:gradientMove 8s ease infinite;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

@keyframes gradientMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

/* INPUT */

.input{
width:100%;

padding:16px;

margin-top:15px;

background:rgba(255,255,255,.08);

border:none;

border-radius:18px;

outline:none;

color:white;
}

/* BUTTON */

.btn{
width:100%;

padding:16px;

margin-top:20px;

background:#2563eb;

border:none;

border-radius:18px;

font-weight:700;

cursor:pointer;

transition:.3s;
}

.btn:hover{
transform:translateY(-3px);
background:#3b82f6;
}

.hidden{
display:none;
}

textarea.input{
min-height:140px;
resize:none;
}

</style>
</head>

<body>

<div class="bg-grid"></div>

<div class="blob bg-blue-500"
style="top:-120px;left:-120px"></div>

<div class="blob bg-purple-500"
style="bottom:-120px;right:-120px"></div>

<div class="card">

<h1 class="text-4xl font-black gradient-text text-center mb-8">

Admin Panel

</h1>

<!-- LOGIN -->

<div id="loginBox">

<p class="text-center text-gray-400 mb-5">

Введите пароль администратора

</p>

<input
id="password"
type="password"
placeholder="Пароль"
class="input">

<button id="loginBtn" class="btn">

Войти

</button>

<p
id="error"
class="hidden text-red-400 mt-4 text-center">

Неверный пароль

</p>

</div>

<!-- ADMIN CMS -->

<div id="adminPanel" class="hidden">

<h2 class="text-2xl font-bold mb-6 text-center">

CMS Управление

</h2>

<input
id="titleInput"
class="input"
placeholder="Название сайта">

<textarea
id="aboutInput"
class="input"
placeholder="Текст о сайте"></textarea>

<button id="saveBtn" class="btn">

Сохранить изменения

</button>

<button
onclick="window.location.href='index.html'"
class="btn"
style="background:#7c3aed">

Вернуться на сайт

</button>

</div>

</div>

<script>

/* PASSWORD */

const PASSWORD = "Ee221352";

/* ELEMENTS */

const loginBtn =
document.getElementById('loginBtn');

const password =
document.getElementById('password');

const error =
document.getElementById('error');

const loginBox =
document.getElementById('loginBox');

const adminPanel =
document.getElementById('adminPanel');

const titleInput =
document.getElementById('titleInput');

const aboutInput =
document.getElementById('aboutInput');

const saveBtn =
document.getElementById('saveBtn');

/* LOGIN */

loginBtn.addEventListener('click',()=>{

if(password.value === PASSWORD){

loginBox.classList.add('hidden');

adminPanel.classList.remove('hidden');

/* LOAD DATA */

titleInput.value =
localStorage.getItem('siteTitle') ||
'Eskenderov Space';

aboutInput.value =
localStorage.getItem('aboutText') ||
'';

}else{

error.classList.remove('hidden');

}

});

/* SAVE */

saveBtn.addEventListener('click',()=>{

localStorage.setItem(
'siteTitle',
titleInput.value
);

localStorage.setItem(
'aboutText',
aboutInput.value
);

alert('Изменения сохранены');

});

</script>

</body>
</html>
